name: Build Android APK (GitHub)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "constants/**"
      - "firebase/**"
      - "services/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-preview.yml"

concurrency:
  group: android-github-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Create signed Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Restore Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Secret ANDROID_KEYSTORE_BASE64 manquant" && exit 1)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/dyno-release.jks

      - name: Configure release signing and Gradle memory
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEYSTORE_PASSWORD" || (echo "Secret ANDROID_KEYSTORE_PASSWORD manquant" && exit 1)
          test -n "$ANDROID_KEY_ALIAS" || (echo "Secret ANDROID_KEY_ALIAS manquant" && exit 1)
          test -n "$ANDROID_KEY_PASSWORD" || (echo "Secret ANDROID_KEY_PASSWORD manquant" && exit 1)

          cat >> android/gradle.properties <<EOF
          DYNO_UPLOAD_STORE_FILE=dyno-release.jks
          DYNO_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          DYNO_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS
          DYNO_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.workers.max=2
          kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
          EOF

          python3 - <<'PY'
          from pathlib import Path

          path = Path("android/app/build.gradle")
          text = path.read_text()

          marker = "    buildTypes {"
          signing = '''    signingConfigs {
              release {
                  storeFile file(DYNO_UPLOAD_STORE_FILE)
                  storePassword DYNO_UPLOAD_STORE_PASSWORD
                  keyAlias DYNO_UPLOAD_KEY_ALIAS
                  keyPassword DYNO_UPLOAD_KEY_PASSWORD
              }
          }
          '''

          if "DYNO_UPLOAD_STORE_FILE" not in text:
              text = text.replace(marker, signing + marker, 1)

          text = text.replace(
              "signingConfig signingConfigs.debug",
              "signingConfig signingConfigs.release",
              1,
          )

          path.write_text(text)
          PY

      - name: Build release APK
        working-directory: android
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
        run: ./gradlew assembleRelease --no-daemon --max-workers=2 --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk DYNO-Esport-Manager.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: DYNO-Esport-Manager-APK
          path: DYNO-Esport-Manager.apk
          retention-days: 30

      - name: Publish instructions
        run: |
          echo "## APK DYNO générée gratuitement sur GitHub" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Télécharge l’artifact **DYNO-Esport-Manager-APK** en bas de cette exécution." >> "$GITHUB_STEP_SUMMARY"
