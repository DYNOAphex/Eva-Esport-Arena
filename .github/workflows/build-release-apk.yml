name: Build and release DYNO APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version à publier (ex. 1.0.1). Laisser vide pour incrémenter le patch."
        required: false
        type: string
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/discord-new-match.yml"
      - "automation/**"
      - "README.md"

permissions:
  contents: write

concurrency:
  group: dyno-android-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: npm install

      - name: Check Android signing secrets
        run: |
          for NAME in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!NAME}" ]; then
              echo "Le secret GitHub $NAME est manquant."
              exit 1
            fi
          done

      - name: Calculate release version
        id: version
        shell: bash
        run: |
          REQUESTED="${{ inputs.version }}"
          if [ -n "$REQUESTED" ]; then
            VERSION="${REQUESTED#v}"
          else
            CURRENT="$(gh release view --json tagName --jq '.tagName' 2>/dev/null || echo 'v0.1.0')"
            CURRENT="${CURRENT#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            VERSION="${MAJOR:-0}.${MINOR:-1}.$(( ${PATCH:-0} + 1 ))"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version invalide: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk=DYNO-Esport-Manager-v$VERSION.apk" >> "$GITHUB_OUTPUT"

      - name: Apply version to app configuration
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          const [major, minor, patch] = version.split('.').map(Number);
          const versionCode = major * 10000 + minor * 100 + patch;

          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.version = version;
          app.expo.android = app.expo.android || {};
          app.expo.android.versionCode = versionCode;
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          NODE

      - name: Generate native Android project
        env:
          CI: "1"
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle memory
        run: |
          cat >> android/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
          org.gradle.workers.max=2
          org.gradle.parallel=false
          org.gradle.daemon=false
          kotlin.compiler.execution.strategy=in-process
          kotlin.incremental=false
          EOF

      - name: Configure release signing
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > android/app/dyno-release.keystore
          if [ ! -s android/app/dyno-release.keystore ]; then
            echo "Le secret ANDROID_KEYSTORE_BASE64 ne produit aucun fichier keystore."
            exit 1
          fi

          if ! keytool -list \
            -keystore android/app/dyno-release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "Le keystore est corrompu, incomplet, ou le mot de passe/alias du keystore est incorrect."
            exit 1
          fi

          mkdir -p signing-test
          printf 'DYNO signing test' > signing-test/test.txt
          jar --create --file signing-test/test.jar -C signing-test test.txt
          if ! jarsigner \
            -keystore android/app/dyno-release.keystore \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            signing-test/test.jar "$ANDROID_KEY_ALIAS" >/dev/null 2>&1; then
            echo "Le secret ANDROID_KEY_PASSWORD est incorrect pour cette clé."
            exit 1
          fi
          rm -rf signing-test

          node - <<'NODE'
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let gradle = fs.readFileSync(path, 'utf8');

          const signingBlock = `signingConfigs {\n        release {\n            storeFile file('dyno-release.keystore')\n            storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')\n            keyAlias System.getenv('ANDROID_KEY_ALIAS')\n            keyPassword System.getenv('ANDROID_KEY_PASSWORD')\n        }`;

          if (!gradle.includes('signingConfigs {')) {
            throw new Error('Bloc signingConfigs introuvable dans android/app/build.gradle');
          }
          gradle = gradle.replace('signingConfigs {', signingBlock);

          const debugSigning = 'signingConfig signingConfigs.debug';
          const lastIndex = gradle.lastIndexOf(debugSigning);
          if (lastIndex < 0) {
            throw new Error('Configuration de signature release introuvable');
          }
          gradle = gradle.slice(0, lastIndex) + 'signingConfig signingConfigs.release' + gradle.slice(lastIndex + debugSigning.length);
          fs.writeFileSync(path, gradle);
          NODE

      - name: Build signed Android APK
        working-directory: android
        timeout-minutes: 25
        run: ./gradlew assembleRelease --no-daemon --max-workers=2 --stacktrace

      - name: Prepare APK
        env:
          APK_NAME: ${{ steps.version.outputs.apk }}
        run: |
          SOURCE="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$SOURCE" ]; then
            echo "APK compilée introuvable: $SOURCE"
            find android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$SOURCE" "$APK_NAME"

      - name: Create GitHub Release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          APK_NAME: ${{ steps.version.outputs.apk }}
        run: |
          gh release create "$TAG" "$APK_NAME" \
            --title "DYNO Esport Manager v$VERSION" \
            --generate-notes \
            --latest
