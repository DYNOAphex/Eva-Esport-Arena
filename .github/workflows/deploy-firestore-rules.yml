name: Deploy Firestore Rules

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVA_ESPORT_ARENA }}

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project eva-esport-arena --non-interactive
