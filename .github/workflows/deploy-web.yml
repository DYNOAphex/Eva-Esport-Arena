name: Deploy DYNO Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate PWA icons
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq imagemagick
          convert assets/images/logo-dyno.png -resize 166x166 -background '#050505' -gravity center -extent 192x192 public/pwa-192.png
          convert assets/images/logo-dyno.png -resize 442x442 -background '#050505' -gravity center -extent 512x512 public/pwa-512.png
          convert assets/images/logo-dyno.png -resize 358x358 -background '#050505' -gravity center -extent 512x512 public/pwa-maskable-512.png

      - name: Export web app
        run: npm run export:web

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
