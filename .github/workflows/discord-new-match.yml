name: Discord and push notifications

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dyno-notifications
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check notification secrets
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVA_ESPORT_ARENA }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          test -n "$FIREBASE_SERVICE_ACCOUNT_JSON" || { echo "Secret manquant: FIREBASE_SERVICE_ACCOUNT_EVA_ESPORT_ARENA"; exit 1; }
          test -n "$DISCORD_WEBHOOK_URL" || { echo "Secret manquant: DISCORD_WEBHOOK_URL"; exit 1; }
          test -n "$VAPID_PRIVATE_KEY" || { echo "Secret manquant: VAPID_PRIVATE_KEY"; exit 1; }
          echo "Secrets Firebase, Discord et Web Push présents."

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_EVA_ESPORT_ARENA }}

      - name: Install worker dependencies
        run: npm install --omit=dev --no-audit --no-fund
        working-directory: automation

      - name: Send pending announcements
        run: npm run notify
        working-directory: automation
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VAPID_PUBLIC_KEY: BAbabRr4zuSW_0C-WA7vJtGXUFsafj4tgTmrbGiWlSFQQzsyg1Ec7BAkJxxWd14JF0hx60vfULSbq6UZ-rdVY8M
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: mailto:dyno-esport-manager@users.noreply.github.com
